<!DOCTYPE html>
<html>
<head>
<title>Marker export</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<style>
  body { font-family: sans-serif; background: #f0f0f0; padding: 2rem; }
  .marker-row { display: flex; align-items: center; gap: 2rem; margin: 1.5rem 0; }
  .marker-box {
    width: 128px; height: 128px;
    display: flex; align-items: center; justify-content: center;
    background: white; border: 1px solid #ccc; border-radius: 8px;
  }
  .fa-layers { font-size: 96px; }
  label { font-size: 1.1rem; min-width: 250px; }
</style>
</head>
<body>
<h1>Council map marker icons</h1>
<p>Right-click each icon → Inspect → copy the <code>&lt;span class="fa-layers"&gt;</code> element as HTML, or screenshot at this size.</p>

<div class="marker-row">
  <div class="marker-box">
    <span class="fa-layers fa-fw" data-marker="standard">
      <i class="fas fa-circle" style="color: #198754; opacity: 0.6;"></i>
      <i class="fas fa-building-columns" data-fa-transform="shrink-7 left-0.1" style="color: #ffffff;"></i>
    </span>
  </div>
  <label>Standard (green, no symbol)</label>
</div>

<div class="marker-row">
  <div class="marker-box">
    <span class="fa-layers fa-fw" data-marker="incomplete">
      <i class="fas fa-circle" style="color: #6c757d; opacity: 0.6;"></i>
      <i class="fas fa-building-columns" data-fa-transform="shrink-7 left-0.1" style="color: #ffffff;"></i>
    </span>
  </div>
  <label>Incomplete (grey, no symbol)</label>
</div>

<div class="marker-row">
  <div class="marker-box">
    <span class="fa-layers fa-fw" data-marker="non-standard-unqualified">
      <i class="fas fa-circle" style="color: #ffc107; opacity: 0.6;"></i>
      <i class="fas fa-building-columns" data-fa-transform="shrink-7 left-0.1" style="color: #ffffff;"></i>
      <i class="fas fa-n" data-fa-transform="shrink-11 right-4.0 down-2.5" style="color: #1a1a1a;"></i>
    </span>
  </div>
  <label>Non-standard unqualified (yellow + N)</label>
</div>

<div class="marker-row">
  <div class="marker-box">
    <span class="fa-layers fa-fw" data-marker="non-standard-qualified">
      <i class="fas fa-circle" style="color: #dc3545; opacity: 0.6;"></i>
      <i class="fas fa-building-columns" data-fa-transform="shrink-7 left-0.1" style="color: #ffffff;"></i>
      <i class="fas fa-q" data-fa-transform="shrink-11 right-4.0 down-2.5" style="color: #1a1a1a;"></i>
    </span>
  </div>
  <label>Non-standard qualified (red + Q)</label>
</div>

</body>
</html>
